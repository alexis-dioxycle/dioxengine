name: DioXengine
slug: dioxengine
description: Engineering document workflows — versioned DAG templates, projects, reviewable structured documents with comments and staleness tracking.
owner: alexis@dioxycle.com

shape: app
database: true
resources:
  memory_mb: 512
  cpu: 1.0
secrets:
  - MCP_API_KEY       # Bearer token for the /mcp endpoint (Claude Code via /_mcp/dioxengine)
  - MS_TENANT_ID      # Entra tenant (SharePoint sync, client credentials)
  - MS_CLIENT_ID      # Entra app registration (Sites.Selected application permission)
  - MS_CLIENT_SECRET  # Entra client secret
  - SHAREPOINT_SITE   # e.g. dioxycle.sharepoint.com:/sites/1tonperdaypilot
  - TOOLS_API_KEY     # machine bearer for the portal's /_tools catalog + pass-through (same value as the portal env)
allowed_egress:
  - login.microsoftonline.com   # Entra token endpoint
  - graph.microsoft.com         # Microsoft Graph (SharePoint drive)
  - apps.dioxycle.com           # document tools: calls to other Dioxycle Apps endpoints
visibility: team
