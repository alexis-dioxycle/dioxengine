services:
  - type: web
    name: dioxengine
    runtime: docker
    dockerfilePath: ./Dockerfile.render
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dioxengine-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: APP_URL
        sync: false # e.g. https://dioxengine.onrender.com
      - key: ALLOWED_EMAIL_DOMAIN
        value: dioxycle.com
      # Microsoft OAuth (web login + MCP authorize). Redirect URI to declare
      # on the Entra app: $APP_URL/auth/microsoft/callback
      - key: AZURE_TENANT_ID
        sync: false
      - key: AZURE_CLIENT_ID
        sync: false
      - key: AZURE_CLIENT_SECRET
        sync: false
      # MCP connector credentials (any random strings; Claude fetches them
      # via /oauth/register)
      - key: MCP_CLIENT_ID
        sync: false
      - key: MCP_CLIENT_SECRET
        sync: false
      - key: ALLOW_DEV_LOGIN
        value: "0"
    healthCheckPath: /health

databases:
  - name: dioxengine-db
    plan: free
    databaseName: dioxengine
